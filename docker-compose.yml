version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: whitesparrow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: whitesparrow
      POSTGRES_PASSWORD: whitesparrow_dev
      POSTGRES_DB: whitesparrow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/backend/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

  minio:
    image: minio/minio:latest
    container_name: whitesparrow_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_dev
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
