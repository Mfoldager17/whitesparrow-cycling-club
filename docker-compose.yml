version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: whitesparrow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: whitesparrow
      POSTGRES_PASSWORD: whitesparrow_dev
      POSTGRES_DB: whitesparrow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/backend/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

volumes:
  postgres_data:
